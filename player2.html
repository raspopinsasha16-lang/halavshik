<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ХАЛЯВЩИК | Плеер</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 20px; font-family: sans-serif; }
        .container { max-width: 600px; margin: 0 auto; }
        video { width: 100%; border: 2px solid #e50914; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #e50914; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <button class="btn" onclick="loadChannels()">📺 Загрузить каналы</button>
    <video id="v" playsinline controls></video>
    <div id="grid"></div>
</div>
<script>
    const video = document.getElementById('v');
    let hls = new Hls();
    function loadChannels() {
        fetch('tv.m3u?t=' + new Date().getTime())
            .then(r => r.text())
            .then(data => {
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        let name = lines[i].split(',')[1];
                        let url = lines[i+1].trim();
                        let btn = document.createElement('button');
                        btn.className = 'btn';
                        btn.innerText = name;
                        btn.onclick = () => {
                            hls.destroy();
                            hls = new Hls();
                            hls.loadSource('https://corsproxy.io/?' + encodeURIComponent(url));
                            hls.attachMedia(video);
                            video.play();
                        };
                        grid.appendChild(btn);
                    }
                }
            });
    }
</script>
</body>
</html>
