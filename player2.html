{% raw %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХАЛЯВЩИК | Телевидение IPTV</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background: linear-gradient(rgba(20, 20, 20, 0.85), rgba(20, 20, 20, 0.85)), url('bg.jpg') no-repeat center center; 
            background-size: cover; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px 10px; 
            text-align: center; 
            min-height: 100vh; 
        }
        h1 { color: #e50914; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 20px; font-size: 28px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .site-main-logo { 
            width: 140px; 
            height: auto; 
            margin: 10px auto 25px auto; 
            display: block; 
            border-radius: 20px; 
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6); 
        }

        .player-box { 
            background: rgba(25, 25, 25, 0.95); 
            border: 2px solid #e50914; 
            padding: 30px 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        .tv-glow-btn { 
            display: block;
            background: linear-gradient(135deg, #e50914, #b20710);
            color: #ffffff; 
            text-decoration: none;
            padding: 18px; 
            border-radius: 10px; 
            font-size: 20px;
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.4);
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .tv-glow-btn:hover { 
            background: linear-gradient(135deg, #ff1e27, #e50914);
            box-shadow: 0 6px 25px rgba(229, 9, 20, 0.6);
            transform: translateY(-2px);
        }
        
        .hint-text {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
            margin-top: 15px;
        }
        
        .back-btn { display: inline-block; color: #aaa; text-decoration: none; margin-top: 25px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Логотип" class="site-main-logo">
    
    <div class="player-box">
        <h1>Онлайн ТВ & IPTV</h1>
        
        <a href="http://sachamaster.pp.ua/2020/2020399.m3u8" class="tv-glow-btn">🚀 Смотреть каналы</a>
        
        <div class="hint-text">
            При нажатии кнопка передаст плейлист прямо в твой установленный плеер на телефоне (VLC, IPTV Pro и др.) для стабильного просмотра без тормозов и блокировок браузера!
        </div>
    </div>

    <a href="index.html" class="back-btn">← На главную</a>
</div>

</body>
</html>
{% endraw %}
