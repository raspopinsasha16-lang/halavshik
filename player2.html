<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХАЛЯВЩИК | Телевидение IPTV</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background: linear-gradient(rgba(20, 20, 20, 0.85), rgba(20, 20, 20, 0.85)), url('bg.jpg') no-repeat center center; 
            background-size: cover; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px 10px; 
            text-align: center; 
            min-height: 100vh; 
        }
        h1 { color: #e50914; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 20px; font-size: 28px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .site-main-logo { 
            width: 140px; 
            height: auto; 
            margin: 10px auto 25px auto; 
            display: block; 
            border-radius: 20px; 
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6); 
        }

        .player-box { background: rgba(25, 25, 25, 0.95); border: 2px solid #e50914; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .player-buttons { display: flex; justify-content: center; margin-bottom: 5px; }
        
        .tv-quick-btn { background: #d4af37; color: black; border: none; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4); }
        .tv-quick-btn:hover { background: #eac65c; }
        
        #video-container { margin-top: 15px; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; }
        #videoPlayer { width: 100%; display: block; aspect-ratio: 16/9; background: #000; }
        #status { font-size: 14px; color: #00bcd4; margin: 15px 0; font-weight: bold; }
        
        .tv-channels-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .channel-btn { background: #1f1f1f; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; text-align: left; }
        .channel-btn:hover { background: #e50914; border-color: #e50914; }
        
        /* Кнопка скачивания */
        .tv-external-btn {
            display: block;
            background: linear-gradient(135deg, #e50914, #b20710);
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
            transition: 0.2s;
        }
        .tv-external-btn:hover { background: linear-gradient(135deg, #ff1e27, #e50914); transform: translateY(-1px); }

        .back-btn { display: inline-block; color: #aaa; text-decoration: none; margin-top: 20px; font-weight: bold; }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>

<audio id="clickSound" src="click.mp3" preload="auto"></audio>

<div class="container">
    <img src="logo.png" alt="Логотип" class="site-main-logo">
    
    <div class="player-box">
        <h1 id="tvTitle">Онлайн ТВ & IPTV</h1>
        
        <div class="player-buttons">
            <button class="tv-quick-btn" onclick="loadIPTVPlaylist('tv.m3u')">📺 Моё ТВ</button>
        </div>
        
        <div id="status">Нажми кнопку выше, чтобы загрузить список каналов</div>
        
        <div id="video-container">
            <video id="videoPlayer" playsinline controls></video>
        </div>
        
        <div class="tv-channels-grid" id="channelsGrid"></div>

        <a href="tv.m3u" download="tv.m3u" class="tv-external-btn" onclick="playSound()">🚀 Скачать плейлист на устройство</a>
    </div>

    <a href="index.html" class="back-btn" onclick="playSound()">← На главную</a>
</div>

<script>
function playSound() {
    var audio = document.getElementById('clickSound');
    if (audio) {
        audio.currentTime = 0;
        audio.play().catch(function(e){});
    }
}

var player = null;
var hlsInstance = null;

// Инициализируем плеер Plyr один раз при старте страницы
document.addEventListener('DOMContentLoaded', () => {
    const video = document.getElementById('videoPlayer');
    player = new Plyr(video, {
        controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen']
    });
});

async function loadIPTVPlaylist(url) {
    playSound();
    const statusDiv = document.getElementById('status');
    const grid = document.getElementById('channelsGrid');
    statusDiv.innerText = "Загрузка списка каналов...";
    grid.innerHTML = "";
    
    try {
        const response = await fetch(url + '?t=' + new Date().getTime());
        if (!response.ok) throw new Error();
        const data = await response.text();
        const channels = parseM3U(data);
        
        if (channels.length === 0) {
            statusDiv.innerText = "Плейлист пуст или имеет неверный формат.";
            return;
        }
        
        statusDiv.innerText = `Доступно каналов: ${channels.length}`;
        
        channels.forEach(ch => {
            const btn = document.createElement('button');
            btn.className = 'channel-btn';
            btn.innerText = ch.name;
            btn.onclick = () => { playStream(ch.url, ch.name); };
            grid.appendChild(btn);
        });
        
        // Автоматически запускаем самый первый канал из списка
        if (channels.length > 0) {
            playStream(channels[0].url, channels[0].name);
        }
    } catch (err) {
        statusDiv.innerText = "Не удалось прочесть файл tv.m3u.";
    }
}

function parseM3U(text) {
    const lines = text.split('\n');
    const channels = [];
    let currentName = "";
    
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
            const commaIndex = line.lastIndexOf(',');
            currentName = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : "Без названия";
        } else if (line && !line.startsWith('#')) {
            channels.push({ name: currentName || "Канал", url: line });
            currentName = "";
        }
    }
    return channels;
}

function playStream(url, name) {
    playSound();
    document.getElementById('tvTitle').innerText = name;
    const video = document.getElementById('videoPlayer');
    const statusDiv = document.getElementById('status');

    // Сбрасываем старый поток HLS, если он был активен
    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }

    if (Hls.isSupported()) {
        hlsInstance = new Hls({
            maxMaxBufferLength: 10 // Ограничиваем буфер для стабильности стрима
        });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play().catch(function(){});
        });
        hlsInstance.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
                statusDiv.innerText = "Ошибка трансляции потока. Возможно, ссылка временно не работает.";
            }
        });
    } 
    // Поддержка для Safari / iOS (iPhone), которые умеют m3u8 сами по себе
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', function() {
            video.play().catch(function(){});
        });
    }
}
</script>

</body>
</html>
