<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ХАЛЯВЩИК | Плеер</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .player-box { max-width: 600px; margin: 0 auto; background: #111; padding: 20px; border-radius: 15px; border: 2px solid #e50914; }
        #videoPlayer { width: 100%; border-radius: 10px; background: #000; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: #e50914; }
    </style>
</head>
<body>
<div class="player-box">
    <h1 id="tvTitle">Выбери канал</h1>
    <video id="videoPlayer" playsinline controls></video>
    <div id="channelsGrid" class="grid"></div>
</div>

<script>
    const video = document.getElementById('videoPlayer');
    const player = new Plyr(video);
    let hls = null;

    // Загружаем список каналов из tv.m3u
    fetch('tv.m3u?t=' + new Date().getTime())
        .then(r => r.text())
        .then(data => {
            const lines = data.split('\n');
            const grid = document.getElementById('channelsGrid');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    let name = lines[i].split(',')[1];
                    let url = lines[i+1].trim();
                    let btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = name;
                    btn.onclick = () => play(url, name);
                    grid.appendChild(btn);
                }
            }
        });

    function play(url, name) {
        document.getElementById('tvTitle').innerText = name;
        if (hls) hls.destroy();
        
        // Используем прокси для обхода блокировок
        const proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
        
        hls = new Hls();
        hls.loadSource(proxy);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    }
</script>
</body>
</html>
