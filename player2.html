<!DOCTYPE html>
<html>
<head>
    <title>Плеер - С поддержкой Magnet</title>
    <script src="https://cdn.jsdelivr.net/webtorrent/latest/webtorrent.min.js"></script>
</head>
<body>

    <div style="text-align: center; margin: 20px;">
        <input type="text" id="magnetLink" placeholder="Вставь magnet:?xt=..." style="width: 80%; padding: 10px;">
        <button onclick="playMagnet()" style="padding: 10px;">Смотреть</button>
    </div>

    <div id="status" style="text-align: center; font-weight: bold; margin: 10px;"></div>
    <div id="player" style="text-align: center;"></div>

    <script>
        var client = new WebTorrent();

        function playMagnet() {
            var input = document.getElementById('magnetLink').value.trim();
            var status = document.getElementById('status');
            var playerDiv = document.getElementById('player');

            // Очистка перед новым запуском
            playerDiv.innerHTML = '';
            status.innerHTML = '🚀 Подключение...';

            // Находим magnet-ссылку в строке
            var magnet = input.substring(input.indexOf("magnet:"));

            if (!magnet.startsWith("magnet:")) {
                status.innerHTML = '❌ Ошибка: Вставь правильную magnet-ссылку!';
                return;
            }

            client.torrents.forEach(t => t.destroy());

            client.add(magnet, function (torrent) {
                torrent.on('ready', function () {
                    status.innerHTML = '✅ Торрент готов!';
                    
                    // Ищем видеофайл
                    var file = torrent.files.find(f => f.name.endsWith('.mp4') || f.name.endsWith('.mkv'));
                    
                    if (file) {
                        // Тот самый базовый запуск
                        file.renderTo('#player', { autoplay: true });
                    } else {
                        status.innerHTML = '❌ Видеофайл не найден.';
                    }
                });
            });
        }
    </script>
</body>
</html>
