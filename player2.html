<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХАЛЯВЩИК | Телевидение IPTV</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background: linear-gradient(rgba(20, 20, 20, 0.85), rgba(20, 20, 20, 0.85)), url('bg.jpg') no-repeat center center; 
            background-size: cover; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px 10px; 
            text-align: center; 
            min-height: 100vh; 
        }
        h1 { color: #e50914; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 20px; font-size: 28px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .site-main-logo { 
            width: 140px; 
            height: auto; 
            margin: 10px auto 25px auto; 
            display: block; 
            border-radius: 20px; 
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6); 
        }

        .player-box { background: rgba(25, 25, 25, 0.95); border: 2px solid #e50914; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Адаптивный фрейм для внешнего плеера */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Соотношение сторон 16:9 */
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            border: 1px solid #444;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        
        .back-btn { display: inline-block; color: #aaa; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Логотип" class="site-main-logo">
    
    <div class="player-box">
        <h1>Онлайн ТВ & IPTV</h1>
        
        <!-- Встраиваем продвинутый плеер, который сам переварит и откроет плейлист -->
        <div class="iframe-container">
            <iframe 
                src="https://www.webosapp.club/player/#http://sachamaster.pp.ua/2020/2020399.m3u8" 
                allowfullscreen="true" 
                webkitallowfullscreen="true" 
                mozallowfullscreen="true">
            </iframe>
        </div>
    </div>

    <a href="index.html" class="back-btn">← На главную</a>
</div>

</body>
</html>
