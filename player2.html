<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХАЛЯВЩИК | Телевидение IPTV</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background: linear-gradient(rgba(20, 20, 20, 0.85), rgba(20, 20, 20, 0.85)), url('bg.jpg') no-repeat center center; 
            background-size: cover; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px 10px; 
            text-align: center; 
            min-height: 100vh; 
        }
        h1 { color: #e50914; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 20px; font-size: 28px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .site-main-logo { 
            width: 140px; 
            height: auto; 
            margin: 10px auto 25px auto; 
            display: block; 
            border-radius: 20px; 
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6); 
        }

        .player-box { background: rgba(25, 25, 25, 0.95); border: 2px solid #e50914; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .player-buttons { display: flex; justify-content: center; margin-bottom: 5px; }
        
        .tv-quick-btn { background: #d4af37; color: black; border: none; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4); }
        .tv-quick-btn:hover { background: #eac65c; }
        
        #video-container { margin-top: 15px; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #status { font-size: 14px; color: #00bcd4; margin: 15px 0; font-weight: bold; }
        
        .tv-channels-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .channel-btn { background: #1f1f1f; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: bold; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; text-align: left; }
        .channel-btn:hover { background: #e50914; border-color: #e50914; }
        
        /* Стиль для нашей спасительной красной кнопки наружного плеера */
        .tv-external-btn {
            display: block;
            background: linear-gradient(135deg, #e50914, #b20710);
            color: #ffffff;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
            transition: 0.2s;
        }
        .tv-external-btn:hover { background: linear-gradient(135deg, #ff1e27, #e50914); transform: translateY(-1px); }

        .back-btn { display: inline-block; color: #aaa; text-decoration: none; margin-top: 20px; font-weight: bold; }
        .back-btn:hover { color: #fff; }
        
        .plyr__controls { background: #e50914 !important; color: #fff !important; }
    </style>
</head>
<body>

<audio id="clickSound" src="click.mp3" preload="auto"></audio>

<div class="container">
    <img src="logo.png" alt="Логотип" class="site-main-logo">
    
    <div class="player-box">
        <h1 id="tvTitle">Онлайн ТВ & IPTV</h1>
        
        <div class="player-buttons">
            <button class="tv-quick-btn" onclick="loadIPTVPlaylist('http://sachamaster.pp.ua/2020/2020399.m3u8')">📺 Моё ТВ</button>
        </div>
        
        <div id="status">Нажми кнопку выше, чтобы загрузить список каналов</div>
        <div id="video-container"></div>
        <div class="tv-channels-grid" id="channelsGrid"></div>

        <a href="http://sachamaster.pp.ua/2020/2020399.m3u8" class="tv-external-btn">🚀 Открыть в плеере телефона</a>
    </div>

    <a href="index.html" class="back-btn" onclick="playSound()">← На главную</a>
</div>

<script>
function playSound() {
    var audio = document.getElementById('clickSound');
    if (audio) {
        audio.currentTime = 0;
        audio.play().catch(function(e){});
    }
}

var player;
var hlsInstance = null;
var plyrConfig = { controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'pip', 'fullscreen'] };

// Твои проверенные рабочие прокси-серверы
const PROXIES = [
    "https://api.allorigins.win/raw?url=",
    "https://corsproxy.io/?",
    "https://thingproxy.freeboard.io/fetch/"
];

async function fetchWithFallback(url) {
    for (let proxy of PROXIES) {
        try {
            const response = await fetch(proxy + encodeURIComponent(url));
            if (response.ok) return await response.text();
        } catch (e) { console.log("Proxy failed:", proxy); }
    }
    throw new Error("Все прокси-серверы недоступны");
}

async function loadIPTVPlaylist(url) {
    playSound();
    const statusDiv = document.getElementById('status');
    const grid = document.getElementById('channelsGrid');
    statusDiv.innerText = "Загрузка плейлиста...";
    grid.innerHTML = "";
    
    try {
        const data = await fetchWithFallback(url);
        const channels = parseM3U(data);
        if (channels.length === 0) {
            statusDiv.innerText = "Не удалось распознать каналы. Проверьте структуру ссылки.";
            return;
        }
        
        statusDiv.innerText = `Успешно загружено каналов: ${channels.length}`;
        
        channels.forEach(ch => {
            const btn = document.createElement('button');
            btn.className = 'channel-btn';
            btn.innerText = ch.name;
            btn.onclick = () => { playStream(ch.url, ch.name); };
            grid.appendChild(btn);
        });
        
        if (channels.length > 0) {
            playStream(channels[0].url, channels[0].name);
        }
    } catch (err) {
        statusDiv.innerText = "Ошибка загрузки плейлиста через прокси.";
    }
}

function parseM3U(text) {
    const lines = text.split('\n');
    const channels = [];
    let currentName = "";
    
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
            const commaIndex = line.lastIndexOf(',');
            currentName = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : "Без названия";
        } else if (line && !line.startsWith('#')) {
            channels.push({ name: currentName || "Канал", url: line });
            currentName = "";
        }
    }
    return channels;
}

function playStream(url, name) {
    playSound();
    document.getElementById('tvTitle').innerText = name;
    const container = document.getElementById('video-container');
    
    if (player) { player.destroy(); player = null; }
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    
    container.innerHTML = `<video id="videoPlayer" playsinline controls style="width:100%; height:auto;"></video>`;
    const video = document.getElementById('videoPlayer');
    
    // Подменяем http на https для обхода смешанного контента, если это возможно
    if (url.startsWith('http://')) {
        url = url.replace('http://', 'https://');
    }

    if (Hls.isSupported()) {
        hlsInstance = new Hls();
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
            player = new Plyr(video, plyrConfig);
            video.play().catch(function(){});
        });
        hlsInstance.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) { document.getElementById('status').innerText = "Не удалось запустить поток. Используйте красную кнопку ниже."; }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        player = new Plyr(video, plyrConfig);
        video.addEventListener('loadedmetadata', function() {
            video.play().catch(function(){});
        });
    }
}
</script>

</body>
</html>
