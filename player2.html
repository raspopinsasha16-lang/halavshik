<!DOCTYPE html>
<html>
<head>
    <title>Плеер 2 - Поиск</title>
    <script src="https://cdn.jsdelivr.net/webtorrent/latest/webtorrent.min.js"></script>
</head>
<body>

    <nav style="margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 5px; text-align: center;">
        <a href="index.html">Главная</a> | 
        <a href="player2.html">Плеер 2 (API поиск)</a> | 
        <a href="alternativa.html">Альтернатива (Гибрид)</a>
    </nav>

    <div style="margin: 20px 0; text-align: center;">
        <input type="text" id="movieSearch" placeholder="Введите название (на англ.)..." style="padding: 10px; width: 300px;">
        <button onclick="searchAndPlay()" style="padding: 10px;">Найти и смотреть</button>
    </div>
    
    <div id="status" style="text-align: center; font-weight: bold; margin-bottom: 10px;"></div>
    
    <div id="player" style="text-align: center;"></div>

    <script>
        var client = new WebTorrent();

        function searchAndPlay() {
            var query = document.getElementById('movieSearch').value;
            var status = document.getElementById('status');
            
            if (!query) { status.innerHTML = '⚠️ Введите название!'; return; }
            status.innerHTML = '🔍 Ищу фильм в базе...';

            fetch('https://yts.mx/api/v2/list_movies.json?query_term=' + encodeURIComponent(query))
                .then(response => response.json())
                .then(data => {
                    if (!data.data.movies) {
                        status.innerHTML = '❌ Фильм не найден.';
                        return;
                    }
                    
                    var movie = data.data.movies[0];
                    var torrent = movie.torrents[0];
                    var magnet = 'magnet:?xt=urn:btih:' + torrent.hash + '&dn=' + encodeURIComponent(movie.title) + '&tr=wss%3A%2F%2Ftracker.openwebtorrent.com';
                    
                    status.innerHTML = '✅ Нашел: ' + movie.title + '. Запускаю...';
                    startPlayback(magnet);
                })
                .catch(err => {
                    status.innerHTML = '❌ Ошибка поиска: ' + err;
                });
        }

        function startPlayback(magnet) {
            client.torrents.forEach(t => client.remove(t));
            client.add(magnet, { announce: ['wss://tracker.openwebtorrent.com'] }, torrent => {
                torrent.on('ready', () => {
                    var file = torrent.files.find(f => f.name.endsWith('.mp4') || f.name.endsWith('.mkv'));
                    if (file) {
                        document.getElementById('status').innerHTML = '🎬 Воспроизведение!';
                        file.renderTo('#player', { autoplay: true });
                    } else {
                        document.getElementById('status').innerHTML = '❌ Видеофайл не найден.';
                    }
                });
            });
        }
    </script>
</body>
</html>
