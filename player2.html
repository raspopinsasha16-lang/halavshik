<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХАЛЯВЩИК | Плеер</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: linear-gradient(rgba(20, 20, 20, 0.85), rgba(20, 20, 20, 0.85)), url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Opel_Insignia_B_facelift_IAA_2019.jpg') no-repeat center center; 
            background-size: cover; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
            min-height: 100vh; 
        }
        .container { max-width: 600px; margin: 0 auto; background: rgba(25, 25, 25, 0.95); padding: 20px; border-radius: 16px; border: 2px solid #e50914; }
        h1 { color: #e50914; }
        .tv-quick-btn { background: #d4af37; border: none; padding: 16px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; margin-bottom: 20px; }
        #videoPlayer { width: 100%; margin-top: 15px; }
        .channel-btn { display: block; background: #1f1f1f; color: #fff; border: 1px solid #444; padding: 12px; margin: 5px 0; border-radius: 6px; width: 100%; cursor: pointer; }
        /* Блок для магнитов */
        .magnet-input { width: 100%; padding: 12px; margin-top: 20px; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Онлайн ТВ & IPTV</h1>
    
    <button class="tv-quick-btn" onclick="loadIPTV()">📺 Загрузить каналы</button>
    <video id="videoPlayer" playsinline controls></video>
    <div id="channelsGrid"></div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #444;">
    
    <h3>Магнитные ссылки</h3>
    <input type="text" id="magnetLink" class="magnet-input" placeholder="Вставь magnet-ссылку...">
    <button class="channel-btn" onclick="playMagnet()">Запустить торрент</button>
</div>

<script>
    const video = document.getElementById('videoPlayer');
    const player = new Plyr(video);
    let hls = new Hls();

    function loadIPTV() {
        fetch('tv.m3u?t=' + new Date().getTime())
            .then(r => r.text())
            .then(data => {
                const grid = document.getElementById('channelsGrid');
                grid.innerHTML = '';
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        let name = lines[i].split(',')[1];
                        let url = lines[i+1].trim();
                        let btn = document.createElement('button');
                        btn.className = 'channel-btn';
                        btn.innerText = name;
                        btn.onclick = () => {
                            hls.destroy();
                            hls = new Hls();
                            hls.loadSource(url);
                            hls.attachMedia(video);
                            video.play();
                        };
                        grid.appendChild(btn);
                    }
                }
            });
    }

    function playMagnet() {
        const link = document.getElementById('magnetLink').value;
        if(link) {
            // Здесь логика обработки магнита (например, переход на WebTorrent или сторонний сервис)
            window.open('https://webtorrent.io/webplayer/#' + encodeURIComponent(link), '_blank');
        }
    }
</script>

</body>
</html>
