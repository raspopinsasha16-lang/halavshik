<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; }
        .player-container { max-width: 600px; margin: 20px auto; }
        #videoPlayer { width: 100%; }
        .tv-quick-btn { background: #d4af37; padding: 15px; border: none; cursor: pointer; font-weight: bold; width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

<div class="player-container">
    <button class="tv-quick-btn" onclick="playStream('http://sachamaster.pp.ua/2020/2020399.m3u8', 'Канал Саша Мастер')">📺 Запустить ТВ</button>
    <div id="video-container">
        <video id="videoPlayer" playsinline controls></video>
    </div>
</div>

<script>
    const player = new Plyr('#videoPlayer');
    
    function playStream(url, name) {
        const video = document.getElementById('videoPlayer');
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });
    }
</script>

</body>
</html>
