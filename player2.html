<!DOCTYPE html>
<html>
<head>
    <title>Плеер 2 - Прямой запуск</title>
    <script src="https://cdn.jsdelivr.net/webtorrent/latest/webtorrent.min.js"></script>
</head>
<body>
    <nav style="margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 5px; text-align: center;">
        <a href="index.html">Главная</a> | 
        <a href="player2.html">Плеер 2 (Прямой ввод)</a> | 
        <a href="alternativa.html">Альтернатива (Гибрид)</a>
    </nav>

    <div style="text-align: center; margin: 20px;">
        <input type="text" id="magnetLink" placeholder="Вставь магнит-ссылку сюда..." style="width: 70%; padding: 10px;">
        <button onclick="startPlayback()" style="padding: 10px;">Смотреть</button>
    </div>
    
    <div id="status" style="text-align: center; font-weight: bold; margin-bottom: 10px;"></div>
    <div id="player" style="text-align: center;"></div>

    <script>
        var client = new WebTorrent();

        function startPlayback() {
            var magnet = document.getElementById('magnetLink').value;
            var status = document.getElementById('status');
            
            if (!magnet) { status.innerHTML = '⚠️ Вставь ссылку!'; return; }
            
            status.innerHTML = '🚀 Загрузка метаданных...';
            client.torrents.forEach(t => client.remove(t));
            
            client.add(magnet, { announce: ['wss://tracker.openwebtorrent.com', 'wss://tracker.btorrent.xyz'] }, torrent => {
                torrent.on('ready', () => {
                    var file = torrent.files.find(f => f.name.endsWith('.mp4') || f.name.endsWith('.mkv'));
                    if (file) {
                        status.innerHTML = '🎬 Воспроизведение!';
                        file.renderTo('#player', { autoplay: true });
                    } else {
                        status.innerHTML = '❌ Видео не найдено в торренте.';
                    }
                });
            });
        }
    </script>
</body>
</html>
