<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Халявщик | Кинотеатр & IPTV</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .player-box { background: #1f1f1f; border: 2px solid #e50914; padding: 20px; border-radius: 16px; max-width: 600px; margin: 0 auto; }
        .tv-quick-btn { background: #248a3d; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        #video-container { margin-top: 15px; min-height: 200px; }
        #status { margin: 10px 0; color: #00bcd4; }
        .tv-channels-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .channel-btn { background: #333; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="player-box">
        <button class="tv-quick-btn" onclick="loadIPTVPlaylist()">📺 Моё ТВ</button>
        <div id="status">Нажми кнопку выше</div>
        <div id="video-container"></div>
        <div class="tv-channels-grid" id="channelsGrid"></div>
    </div>

    <script>
        var hlsInstance = null;
        var playlistUrl = 'https://corsproxy.io/?http://sachamaster.pp.ua/2020/2020399.m3u8';

        function loadIPTVPlaylist() {
            var status = document.getElementById('status');
            var grid = document.getElementById('channelsGrid');
            grid.innerHTML = '';
            status.innerHTML = '⌛ Загрузка...';

            fetch(playlistUrl)
                .then(r => r.text())
                .then(data => {
                    var lines = data.split('\n');
                    lines.forEach((line, i) => {
                        if (line.startsWith('#EXTINF:')) {
                            var name = line.split(',').pop();
                            var url = lines[i + 1];
                            var btn = document.createElement('button');
                            btn.className = 'channel-btn';
                            btn.innerText = name;
                            btn.onclick = function() { startStream(url); };
                            grid.appendChild(btn);
                        }
                    });
                    status.innerHTML = '📺 Выберите канал:';
                })
                .catch(e => { status.innerHTML = '❌ Ошибка загрузки списка'; });
        }

        function startStream(url) {
            var container = document.getElementById('video-container');
            container.innerHTML = '<video id="player" playsinline controls style="width:100%"></video>';
            var video = document.getElementById('player');
            
            if (hlsInstance) hlsInstance.destroy();
            
            hlsInstance = new Hls();
            hlsInstance.loadSource('https://corsproxy.io/?' + encodeURIComponent(url));
            hlsInstance.attachMedia(video);
            hlsInstance.on('hlsManifestParsed', () => video.play());
            document.getElementById('status').innerHTML = '▶ Эфир запущен';
        }
    </script>
</body>
</html>
