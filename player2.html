<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХАЛЯВЩИК | Телевидение IPTV</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background: linear-gradient(rgba(20, 20, 20, 0.85), rgba(20, 20, 20, 0.85)), url('bg.jpg') no-repeat center center; 
            background-size: cover; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px 10px; 
            text-align: center; 
            min-height: 100vh; 
        }
        h1 { color: #e50914; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 20px; font-size: 28px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .site-main-logo { 
            width: 140px; 
            height: auto; 
            margin: 10px auto 25px auto; 
            display: block; 
            border-radius: 20px; 
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6); 
        }

        .player-box { background: rgba(25, 25, 25, 0.95); border: 2px solid #e50914; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .player-buttons { display: flex; justify-content: center; margin-bottom: 15px; }
        
        .tv-quick-btn { 
            background: #d4af37; 
            color: #000; 
            border: none; 
            padding: 16px; 
            width: 100%;
            border-radius: 8px; 
            font-size: 18px;
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); 
        }
        .tv-quick-btn:hover { background: #eac65c; }
        
        #video-container { margin-top: 15px; border-radius: 12px; overflow: hidden; background: #000; display: none; }
        #status { font-size: 15px; color: #00bcd4; margin: 15px 0; font-weight: bold; }
        
        .tv-channels-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        .channel-btn { background: #1f1f1f; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
        .channel-btn:hover { background: #e50914; border-color: #e50914; }
        
        .back-btn { display: inline-block; color: #aaa; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Логотип" class="site-main-logo">
    
    <div class="player-box">
        <h1 id="tvTitle">Онлайн ТВ & IPTV</h1>
        
        <div class="player-buttons">
            <button class="tv-quick-btn" onclick="loadIPTVPlaylist()">📺 Моё ТВ</button>
        </div>
        
        <div id="status">Нажми кнопку выше, чтобы загрузить список каналов</div>
        <div id="video-container"></div>
        <div class="tv-channels-grid" id="channelsGrid"></div>
    </div>

    <a href="index.html" class="back-btn">← На главную</a>
</div>

<script>
    var player = null;
    var hlsInstance = null;
    var playlistUrl = 'http://sachamaster.pp.ua/2020/2020399.m3u8';

    function loadIPTVPlaylist() {
        const statusEl = document.getElementById('status');
        const gridEl = document.getElementById('channelsGrid');
        const videoCont = document.getElementById('video-container');

        gridEl.innerHTML = ''; 
        statusEl.innerText = 'Подключаемся к серверу каналов...';
        videoCont.style.display = 'none';

        if(hlsInstance) hlsInstance.destroy();

        fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(playlistUrl))
            .then(response => {
                if (!response.ok) throw new Error();
                return response.json();
            })
            .then(data => {
                if (data.contents) {
                    parsePlaylist(data.contents);
                } else {
                    throw new Error();
                }
            })
            .catch(() => {
                statusEl.innerText = 'Не удалось загрузить каналы. Попробуйте еще раз.';
            });
    }

    function parsePlaylist(data) {
        const statusEl = document.getElementById('status');
        // Разбиваем строки учитывая любые варианты переносов (Windows/Linux)
        const lines = data.split(/\r?\n/);
        let channelCount = 0;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                // Ищем следующую строку, которая содержит саму ссылку
                let urlLine = '';
                for (let j = i + 1; j < lines.length; j++) {
                    let nextLine = lines[j].trim();
                    if (nextLine.startsWith('http')) {
                        urlLine = nextLine;
                        break;
                    }
                    if (nextLine.startsWith('#')) {
                        break; // Начался другой тег, ссылки нет
                    }
                }
                
                if (urlLine) {
                    let nameMatch = line.match(/,(.*)$/);
                    let channelName = nameMatch ? nameMatch[1].trim() : 'Без названия';
                    createChannelButton(channelName, urlLine);
                    channelCount++;
                }
            }
        }
        
        if (channelCount > 0) {
            statusEl.innerText = `Успешно! Загружено каналов: ${channelCount}. Выберите канал.`;
        } else {
            statusEl.innerText = 'Не удалось распознать каналы. Проверьте структуру ссылки.';
        }
    }

    function createChannelButton(name, url) {
        const gridEl = document.getElementById('channelsGrid');
        const button = document.createElement('button');
        button.className = 'channel-btn';
        button.innerText = name;
        button.onclick = () => {
            playM3U8(url);
        };
        gridEl.appendChild(button);
    }

    function playM3U8(url) {
        const container = document.getElementById('video-container');
        container.innerHTML = '<video id="player" playsinline controls autocomplete="off"></video>';
        container.style.display = 'block';
        
        const video = document.getElementById('player');
        const statusEl = document.getElementById('status');
        statusEl.innerText = 'Запуск эфира...';

        if (Hls.isSupported()) {
            if(hlsInstance) hlsInstance.destroy();
            hlsInstance = new Hls();
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                player = new Plyr(video);
                video.play().catch(() => {});
                statusEl.innerText = 'Трансляция запущена!';
            });
            hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                if(data.fatal) {
                    statusEl.innerText = 'Ошибка воспроизведения потока.';
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            player = new Plyr(video);
            video.play().catch(() => {});
            statusEl.innerText = 'Трансляция запущена!';
        }
    }
</script>

</body>
</html>
