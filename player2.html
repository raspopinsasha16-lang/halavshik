<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХАЛЯВЩИК | Телевидение IPTV</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: linear-gradient(rgba(20, 20, 20, 0.85), rgba(20, 20, 20, 0.85)), url('bg.jpg') no-repeat center center; background-size: cover; color: #ffffff; margin: 0; padding: 20px 10px; text-align: center; min-height: 100vh; }
        h1 { color: #e50914; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 20px; font-size: 28px; }
        .container { max-width: 600px; margin: 0 auto; }
        .site-main-logo { width: 140px; height: auto; margin: 10px auto 25px auto; display: block; border-radius: 20px; box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6); transition: transform 0.3s ease; }
        .player-box { background: rgba(25, 25, 25, 0.95); border: 2px solid #e50914; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .player-box input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #e50914; background: #000; color: #fff; box-sizing: border-box; }
        .player-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .main-play-btn { background: #e50914; color: white; border: none; padding: 14px; margin: 10px 0; border-radius: 8px; font-weight: bold; cursor: pointer; flex-grow: 2; }
        .tv-quick-btn { background: #d4af37; color: #000; border: none; padding: 14px; margin: 10px 0; border-radius: 8px; font-weight: bold; cursor: pointer; flex-grow: 1; }
        #video-container { margin-top: 15px; border-radius: 12px; overflow: hidden; background: #000; display: none; }
        #status { font-size: 14px; color: #00bcd4; margin: 12px 0; font-weight: bold; word-wrap: break-word; }
        .tv-channels-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; max-height: 250px; overflow-y: auto; }
        .channel-btn { background: #1f1f1f; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-btn:hover { background: #e50914; border-color: #e50914; }
        .back-btn { display: inline-block; color: #aaa; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <img src="logo.png" alt="Логотип" class="site-main-logo">
    <div class="player-box">
        <h1 id="tvTitle">Онлайн ТВ & IPTV</h1>
        <input type="text" id="streamUrl" value="http://sachamaster.pp.ua/2020/2020399.m3u8">
        <div class="player-buttons">
            <button class="main-play-btn" onclick="playAction()">Включить</button>
            <button class="tv-quick-btn" onclick="loadIPTVPlaylist('http://sachamaster.pp.ua/2020/2020399.m3u8')">📺 Моё ТВ</button>
        </div>
        <div id="status">Нажми «Моё ТВ», чтобы загрузить список каналов</div>
        <div id="video-container"></div>
        <div class="tv-channels-grid" id="channelsGrid"></div>
    </div>
    <a href="index.html" class="back-btn">← На главную</a>
</div>
<script>
    var hlsInstance = null;
    var playerInstance = null;
    
    // Используем мощный прокси-сервер, маскирующий под приложение
    var menuProxy = 'https://cors-anywhere.herokuapp.com/';

    function loadIPTVPlaylist(url) {
        const statusEl = document.getElementById('status');
        statusEl.innerText = 'Загрузка плейлиста через защищенный канал...';
        
        fetch(menuProxy + url)
        .then(r => {
            if (!r.ok) throw new Error('Блокировка прокси');
            return r.text();
        })
        .then(data => {
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = '';
            let count = 0;
            
            const lines = data.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    let name = lines[i].split(',')[1] || 'Канал без названия';
                    let urlLine = lines[i+1] ? lines[i+1].trim() : '';
                    
                    if (urlLine && urlLine.startsWith('http')) {
                        let btn = document.createElement('button');
                        btn.className = 'channel-btn';
                        btn.innerText = name.trim();
                        btn.onclick = () => { 
                            document.getElementById('streamUrl').value = urlLine; 
                            playAction(); 
                        };
                        grid.appendChild(btn);
                        count++;
                    }
                }
            }
            statusEl.innerText = `Успешно! Загружено каналов: ${count}. Выберите канал.`;
        })
        .catch(err => {
            // Если публичный cors-anywhere требует активации демо-доступа
            statusEl.innerHTML = 'Для активации просмотра перейдите по ссылке <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" style="color:#d4af37;">cors-anywhere.herokuapp.com/corsdemo</a>, нажмите кнопку "Request temporary access" и обновите эту страницу.';
            console.error(err);
        });
    }

    function playAction() {
        let url = document.getElementById('streamUrl').value.trim();
        let statusEl = document.getElementById('status');
        let cont = document.getElementById('video-container');
        
        statusEl.innerText = 'Подключение к телевещанию...';
        cont.innerHTML = '<video id="player" playsinline controls autoplay></video>';
        cont.style.display = 'block';
        
        let video = document.getElementById('player');
        
        if (Hls.isSupported()) {
            if(hlsInstance) hlsInstance.destroy();
            hlsInstance = new Hls();
            
            // Загружаем сам поток через прокси, чтобы обойти блокировку видеоплеером
            hlsInstance.loadSource(menuProxy + url);
            hlsInstance.attachMedia(video);
            
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                playerInstance = new Plyr(video);
                statusEl.innerText = 'Трансляция запущена!';
            });
            
            hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    statusEl.innerText = 'Поток заблокирован сервером вещания.';
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = menuProxy + url;
            playerInstance = new Plyr(video);
            statusEl.innerText = 'Воспроизведение...';
        }
    }
</script>
</body>
</html>
