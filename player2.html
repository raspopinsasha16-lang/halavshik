<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ТВ Плеер</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 20px; font-family: sans-serif; }
        .box { max-width: 600px; margin: 0 auto; }
        video { width: 100%; border: 2px solid #e50914; background: #000; }
        .btn { display: block; width: 100%; padding: 15px; margin-top: 10px; background: #e50914; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <video id="v" controls playsinline></video>
    <button class="btn" onclick="playIt()">Запустить канал Саша Мастер</button>
</div>

<script>
    function playIt() {
        const v = document.getElementById('v');
        const url = 'https://corsproxy.io/?http://sachamaster.pp.ua/2020/2020399.m3u8';
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        } else {
            v.src = url;
            v.play();
        }
    }
</script>
</body>
</html>
