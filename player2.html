<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ТВ Плеер</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; padding: 20px; text-align: center; }
        .box { max-width: 600px; margin: 0 auto; background: #111; padding: 20px; border-radius: 15px; }
        #videoPlayer { width: 100%; }
        .btn { display: block; background: #e50914; color: #fff; border: none; padding: 15px; margin: 10px 0; width: 100%; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <button class="btn" onclick="loadChannels()">📺 Загрузить каналы</button>
        <video id="videoPlayer" playsinline controls></video>
        <div id="grid"></div>
    </div>

<script>
    const video = document.getElementById('videoPlayer');
    const player = new Plyr(video);
    let hls = new Hls();

    function loadChannels() {
        // Мы берем данные из твоего файла tv.m3u
        fetch('tv.m3u?t=' + new Date().getTime())
            .then(r => r.text())
            .then(data => {
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        let name = lines[i].split(',')[1];
                        let url = lines[i+1].trim();
                        let btn = document.createElement('button');
                        btn.className = 'btn';
                        btn.innerText = name;
                        btn.onclick = () => {
                            hls.destroy();
                            hls = new Hls();
                            // Используем прокси, чтобы обойти блокировку
                            hls.loadSource('https://corsproxy.io/?' + encodeURIComponent(url));
                            hls.attachMedia(video);
                            video.play();
                        };
                        grid.appendChild(btn);
                    }
                }
            });
    }
</script>
</body>
</html>
