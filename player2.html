<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Моё IPTV</title>
    <script src="https://cdn.jsdelivr.net/webtorrent/latest/webtorrent.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 10px; }
        h2 { text-align: center; }
        .channel-btn { display: block; width: 100%; max-width: 400px; padding: 15px; margin: 10px auto; background: #333; color: white; border: 1px solid #555; border-radius: 8px; font-size: 16px; cursor: pointer; }
        #player-container { text-align: center; margin-top: 20px; min-height: 250px; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; border-radius: 8px; }
        .play-btn { background: #e50914; color: white; font-size: 20px; font-weight: bold; padding: 20px 40px; border: none; border-radius: 10px; cursor: pointer; }
        #status { text-align: center; font-weight: bold; margin: 10px; color: #ffcc00; min-height: 20px; }
        video { width: 100%; outline: none; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>Моё IPTV</h2>
    <div id="status">Выберите канал...</div>
    
    <div id="player-container">
        <span style="color: #666;">Экран плеера</span>
    </div>
    
    <div style="margin-top: 20px;">
        <button class="channel-btn" onclick="loadChannel('ТВОЙ_МАГНИТ_РОССИЯ_1', 'Россия 1')">Россия 1</button>
        <button class="channel-btn" onclick="loadChannel('ТВОЙ_МАГНИТ_ПЕРВЫЙ', 'Первый канал')">Первый канал</button>
        <button class="channel-btn" onclick="loadChannel('ТВОЙ_МАГНИТ_НТВ', 'НТВ')">НТВ</button>
    </div>

    <script>
        var client = new WebTorrent();

        function loadChannel(magnet, channelName) {
            var status = document.getElementById('status');
            var playerContainer = document.getElementById('player-container');
            
            status.innerHTML = '🚀 Подключение к: ' + channelName + '...';
            playerContainer.innerHTML = ''; 

            // Очищаем старые потоки
            client.torrents.forEach(t => t.destroy());

            client.add(magnet, function (torrent) {
                torrent.on('ready', function () {
                    status.innerHTML = '✅ Поток найден! Жми кнопку ниже.';
                    
                    var file = torrent.files.find(f => f.name.endsWith('.mp4') || f.name.endsWith('.mkv'));
                    
                    if (file) {
                        // СОЗДАЕМ КНОПКУ-ТРИГГЕР ДЛЯ МОБИЛЬНОГО БРАУЗЕРА
                        var startBtn = document.createElement("button");
                        startBtn.className = "play-btn";
                        startBtn.innerHTML = "▶ СМОТРЕТЬ";
                        
                        startBtn.onclick = function() {
                            status.innerHTML = '🎬 Воспроизведение...';
                            playerContainer.innerHTML = ''; // Убираем кнопку
                            
                            // Запускаем видео только после нажатия
                            file.renderTo(playerContainer, { 
                                autoplay: true, 
                                controls: true 
                            });
                        };
                        
                        playerContainer.appendChild(startBtn);
                    } else {
                        status.innerHTML = '❌ В потоке нет видеофайла.';
                    }
                });
                
                torrent.on('error', function (err) {
                    status.innerHTML = '❌ Ошибка сети или торрента.';
                });
            });
        }
    </script>
</body>
</html>
