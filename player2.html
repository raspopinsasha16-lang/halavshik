<!DOCTYPE html>
<html>
<head>
    <title>Моё IPTV</title>
    <script src="https://cdn.jsdelivr.net/webtorrent/latest/webtorrent.min.js"></script>
    <style>
        .channel-btn { display: block; width: 100%; padding: 15px; margin: 5px 0; background: #333; color: white; border: none; }
        #player { margin-top: 20px; }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <h2>Моё IPTV</h2>
        <div id="status" style="font-weight: bold; margin: 10px;"></div>
        <div id="player"></div>
        
        <button class="channel-btn" onclick="playChannel('magnet:?xt=urn:btih:...')">Россия 1</button>
        <button class="channel-btn" onclick="playChannel('magnet:?xt=urn:btih:...')">Первый канал</button>
        </div>

    <script>
        var client = new WebTorrent();

        function playChannel(magnet) {
            var status = document.getElementById('status');
            var playerDiv = document.getElementById('player');
            
            status.innerHTML = '🚀 Запуск...';
            playerDiv.innerHTML = ''; // Очистка старого видео

            // Останавливаем все предыдущие торренты
            client.torrents.forEach(t => t.destroy());

            client.add(magnet, function (torrent) {
                torrent.on('ready', function () {
                    status.innerHTML = '✅ Готово!';
                    var file = torrent.files.find(f => f.name.endsWith('.mp4') || f.name.endsWith('.mkv'));
                    if (file) {
                        // Тот самый метод, который ты просил
                        file.renderTo('#player', { autoplay: true });
                    }
                });
            });
        }
    </script>
</body>
</html>
