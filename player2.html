<!DOCTYPE html>
<html>
<head>
    <title>Плеер - Стабильный</title>
    <script src="https://cdn.jsdelivr.net/webtorrent/latest/webtorrent.min.js"></script>
</head>
<body>
    <div style="text-align: center; margin: 20px;">
        <input type="text" id="magnetLink" placeholder="Вставь сюда только magnet:?xt=..." style="width: 80%; padding: 10px;">
        <button onclick="playMagnet()" style="padding: 10px;">Смотреть</button>
    </div>
    <div id="status" style="text-align: center; font-weight: bold; margin: 10px;"></div>
    <div id="player" style="text-align: center;"></div>

    <script>
        var client = new WebTorrent();

        function playMagnet() {
            var input = document.getElementById('magnetLink').value.trim();
            var status = document.getElementById('status');
            var magnet = input.substring(input.indexOf("magnet:"));
            
            if (!magnet.startsWith("magnet:")) {
                status.innerHTML = '❌ Ошибка: Вставь правильную magnet-ссылку!';
                return;
            }
            playChannel(magnet);
        }

                function playChannel(magnet) {
            var status = document.getElementById('status');
            var playerDiv = document.getElementById('player');
            
            // МАЯЧОК 1: Проверка, что функция запущена
            console.log("Функция playChannel запущена с магнитом:", magnet);
            status.innerHTML = '🚀 Инициализация...';

            client.torrents.forEach(t => client.remove(t));

            client.add(magnet, { 
                announce: ['wss://tracker.openwebtorrent.com', 'wss://tracker.btorrent.xyz'] 
            }, function (torrent) {
                // МАЯЧОК 2: Торрент добавлен
                console.log("Торрент добавлен, ждем готовности...");
                
                torrent.on('ready', function () {
                    console.log("Торрент готов!");
                    var file = torrent.files.find(f => f.name.endsWith('.mp4') || f.name.endsWith('.mkv'));
                    
                    if (file) {
                        status.innerHTML = '✅ Канал готов! Нажми кнопку:';
                        var btn = document.createElement("button");
                        btn.innerHTML = "▶ ЗАПУСТИТЬ ТРАНСЛЯЦИЮ";
                        btn.style.width = "100%";
                        btn.style.padding = "20px";
                        btn.onclick = function() {
                            status.innerHTML = '🎬 Воспроизведение...';
                            file.getBlobURL(function (err, url) {
                                if (err) {
                                    status.innerHTML = '❌ Ошибка Blob: ' + err.message;
                                    return;
                                }
                                var video = document.createElement('video');
                                video.src = url;
                                video.controls = true;
                                video.autoplay = true;
                                video.style.width = '100%';
                                playerDiv.innerHTML = '';
                                playerDiv.appendChild(video);
                            });
                            btn.style.display = 'none';
                        };
                        playerDiv.appendChild(btn);
                    } else {
                        status.innerHTML = '❌ В торренте нет видеофайла.';
                        console.log("Файлы в торренте:", torrent.files.map(f => f.name));
                    }
                });
                
                // МАЯЧОК 3: Ошибки торрента
                torrent.on('error', function (err) {
                    status.innerHTML = '❌ Ошибка торрента: ' + err.message;
                    console.error(err);
                });
            });
        }

        }
    </script>
</body>
</html>
