<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 20px; }
        .btn { background: #e50914; padding: 15px; width: 100%; border: none; color: white; cursor: pointer; }
        video { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
    <button class="btn" onclick="loadChannels()">Загрузить каналы</button>
    <video id="v" controls></video>
    <div id="grid"></div>
    <script>
        const v = document.getElementById('v');
        let hls = new Hls();
        function loadChannels() {
            fetch('tv.m3u').then(r => r.text()).then(data => {
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('http')) {
                        let btn = document.createElement('button');
                        btn.className = 'btn';
                        btn.innerText = "Запустить Саша Мастер";
                        btn.onclick = () => {
                            hls.destroy();
                            hls = new Hls();
                            hls.loadSource('https://corsproxy.io/?' + encodeURIComponent(lines[i].trim()));
                            hls.attachMedia(v);
                            v.play();
                        };
                        document.getElementById('grid').appendChild(btn);
                    }
                }
            });
        }
    </script>
</body>
</html>
