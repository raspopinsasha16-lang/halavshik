<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАЗ-2107 Симулятор | Халявщик</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #141414;
            color: #fff;
            margin: 0;
            padding: 10px;
            text-align: center;
            user-select: none;
        }
        h1 { color: #e50914; margin: 5px 0; font-size: 22px; }
        .game-container { max-width: 800px; margin: 0 auto; position: relative; }
        
        /* Экран игры */
        canvas {
            width: 100%;
            max-width: 800px;
            height: auto;
            background: #000;
            border: 2px solid #e50914;
            border-radius: 12px;
            display: block;
        }

        /* Инструкция по кнопкам */
        .controls-info {
            background: #1f1f1f;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
            color: #aaa;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }
        .key { background: #333; color: #fff; padding: 2px 6px; border-radius: 4px; border: 1px solid #555; font-weight: bold;}

        /* Мобильный блок управления */
        .mobile-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn-ui {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn-ui:active { background: #e50914; border-color: #e50914; }
        .back-btn { display: inline-block; color: #aaa; text-decoration: none; margin-top: 15px; font-weight: bold; }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <audio id="clickSound" src="click.mp3" preload="auto"></audio>
    <audio id="engineStartSound" src="click2.mp3" preload="auto"></audio>
    <audio id="engineDriveSound" src="click3.mp3" preload="auto" loop></audio>

    <h1>🚗 ВАЗ-2107: Ночной Экспресс</h1>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div class="mobile-pad">
            <button class="btn-ui" id="btnLeft">◀ Руль Л</button>
            <button class="btn-ui" id="btnGas">ГАЗ (▲)</button>
            <button class="btn-ui" id="btnRight">Руль П ▶</button>
            <button class="btn-ui" id="btnCamL">🎥 Лев</button>
            <button class="btn-ui" id="btnBrake">ТОРМОЗ (▼)</button>
            <button class="btn-ui" id="btnCamR">🎥 Прав</button>
        </div>

        <div class="controls-info">
            <div><span class="key">W</span> / <span class="key">▲</span> Газ</div>
            <div><span class="key">S</span> / <span class="key">▼</span> Тормоз</div>
            <div><span class="key">A</span> / <span class="key">◀</span> Левее</div>
            <div><span class="key">D</span> / <span class="key">▶</span> Правее</div>
            <div><span class="key">Q</span> / <span class="key">E</span> Камера Л/П</div>
            <div><span class="key">Клик мыши</span> — Торпеда (Руль — Запуск, Печка/Магнитола)</div>
        </div>

       <a href="index.html" class="back-btn" onclick="document.getElementById('clickSound').play()">← В главное меню</a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ЗАГРУЗКА ИЗОБРАЖЕНИЯ САЛОНА
        const dashImage = new Image();
        dashImage.src = 'dashboard.png'; 
        let dashLoaded = false;
        dashImage.onload = () => { dashLoaded = true; };

        // Состояние игры
        let speed = 0;
        let maxSpeed = 150;
        let odometer = 1240.0;
        let fuel = 85;
        let score = 1240;
        let playerX = 0; 
        let steeringAngle = 0; 
        let cameraPan = 0; 
        let engineStarted = false; 

        // Интерактивные элементы торпеды
        let radioOn = false;
        let heaterLevel = 0; 
        let dashLightsColor = 'rgba(0, 255, 100, 0.3)'; 

        // Клавиши управления
        let keys = { w: false, a: false, s: false, d: false, q: false, e: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        // Дорога
        let roadLines = [];
        for (let i = 0; i < 10; i++) roadLines.push(i * 50);

        // Трафик
        let traffic = [
            { x: -0.3, y: 300, speed: 40, type: 'truck' },
            { x: 0.4, y: 100, speed: 60, type: 'car' }
        ];

        // Слушатели клавиатуры
        window.addEventListener('keydown', e => { 
            let k = e.key.toLowerCase();
            if (k in keys) keys[k] = true;
            if (e.key in keys) keys[e.key] = true;
        });
        window.addEventListener('keyup', e => { 
            let k = e.key.toLowerCase();
            if (k in keys) keys[k] = false;
            if (e.key in keys) keys[e.key] = false;
        });

        // Клик по торпеде
        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);

            // Зона руля / замка зажигания
            if (clickX >= 150 && clickX <= 350 && clickY >= 360 && clickY <= 500) {
                if (!engineStarted) {
                    engineStarted = true;
                    document.getElementById('engineStartSound').play();
                    
                    setTimeout(() => {
                        if (engineStarted) {
                            const driveSound = document.getElementById('engineDriveSound');
                            driveSound.volume = 0.3;
                            driveSound.playbackRate = 0.8; // ИСПРАВЛЕНО: теперь меняем скорость звука, а не картинки
                            driveSound.play().catch(err => console.log(err));
                        }
                    }, 1500);
                }
            }

            // Зона магнитолы
            if (clickX >= 480 && clickX <= 580 && clickY >= 360 && clickY <= 400) {
                document.getElementById('clickSound').play();
                if (engineStarted) radioOn = !radioOn;
            }
            // Зона печки
            if (clickX >= 480 && clickX <= 560 && clickY >= 415 && clickY <= 445) {
                document.getElementById('clickSound').play();
                if (engineStarted) heaterLevel = (heaterLevel + 1) % 3;
            }
        });

        // Мобильное управление
        setupMobileBtn('btnGas', ['w', 'ArrowUp']);
        setupMobileBtn('btnBrake', ['s', 'ArrowDown']);
        setupMobileBtn('btnLeft', ['a', 'ArrowLeft']);
        setupMobileBtn('btnRight', ['d', 'ArrowRight']);
        setupMobileBtn('btnCamL', ['q']);
        setupMobileBtn('btnCamR', ['e']);

        function setupMobileBtn(id, keyCodes) {
            const btn = document.getElementById(id);
            if(!btn) return;
            const start = (e) => { e.preventDefault(); keyCodes.forEach(k => keys[k] = true); };
            const end = (e) => { e.preventDefault(); keyCodes.forEach(k => keys[k] = false); };
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', end);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
        }

        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            let isGassing = keys.w || keys.ArrowUp;

            if (isGassing && engineStarted) {
                speed += 0.5;
                if (speed > maxSpeed) speed = maxSpeed;
            } else if (keys.s || keys.ArrowDown) {
                speed -= 1.5;
                if (speed < 0) speed = 0;
            } else {
                speed -= 0.2;
                if (speed < 0) speed = 0;
            }

            if (engineStarted) {
                const driveSound = document.getElementById('engineDriveSound');
                if (driveSound) {
                    let rpmFactor = (speed / maxSpeed); 
                    if (isGassing) rpmFactor += 0.2; 
                    driveSound.playbackRate = 0.8 + (rpmFactor * 1.2); 
                    driveSound.volume = isGassing ? 0.7 : 0.3; 
                }
            }

            if (keys.a || keys.ArrowLeft) {
                playerX -= 0.005 * (speed / 50);
                steeringAngle -= 0.05;
                if (steeringAngle < -0.6) steeringAngle = -0.6;
            } else if (keys.d || keys.ArrowRight) {
                playerX += 0.005 * (speed / 50);
                steeringAngle += 0.05;
                if (steeringAngle > 0.6) steeringAngle = 0.6;
            } else {
                steeringAngle *= 0.8;
            }

            if (playerX < -1.2) playerX = -1.2;
            if (playerX > 1.2) playerX = 1.2;

            if (keys.q) {
                cameraPan += 2;
                if (cameraPan > 25) cameraPan = 25;
            } else if (keys.e) {
                cameraPan -= 2;
                if (cameraPan < -25) cameraPan = -25;
            } else {
                cameraPan *= 0.8;
            }

            for (let i = 0; i < roadLines.length; i++) {
                roadLines[i] += speed * 0.1;
                if (roadLines[i] > 500) roadLines[i] = 0;
            }

            traffic.forEach(car => {
                car.y += (speed - car.speed) * 0.05;
                if (car.y > 500) { car.y = -50; car.x = (Math.random() * 1.6) - 0.8; }
                if (car.y < -100) car.y = 500;
            });

            if (speed > 0) {
                odometer += (speed * 0.0001);
                score += Math.floor(speed * 0.01);
                fuel -= 0.001;
                if (fuel < 0) fuel = 100;
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(cameraPan * 2, 0);

            // 1. ОКРУЖЕНИЕ (Под лобовым стеклом)
            ctx.fillStyle = '#0b0f19'; 
            ctx.fillRect(-200, 0, canvas.width + 400, 250);

            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(600, 60, 20, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = '#141911'; 
            ctx.fillRect(-200, 250, canvas.width + 400, 250);

            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.moveTo(350, 250); ctx.lineTo(450, 250);
            ctx.lineTo(800 - (playerX * 300), 500); ctx.lineTo(0 - (playerX * 300), 500);
            ctx.fill();

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 4;
            roadLines.forEach(lineY => {
                let y = 250 + (lineY * 0.5);
                let screenX = 400 - (playerX * (lineY * 0.6));
                ctx.beginPath();
                ctx.moveTo(screenX, y);
                ctx.lineTo(screenX - (playerX * 0.2), y + 15);
                ctx.stroke();
            });

            traffic.forEach(car => {
                let carScale = car.y / 400;
                if (carScale < 0.1) carScale = 0.1;
                let carX = 400 + (car.x - playerX) * car.y;
                
                ctx.fillStyle = car.type === 'truck' ? '#248a3d' : '#33b5e5';
                ctx.fillRect(carX - (20 * carScale), car.y, 40 * carScale, 30 * carScale);
                ctx.fillStyle = 'red';
                ctx.fillRect(carX - (18 * carScale), car.y + (20 * carScale), 8 * carScale, 5 * carScale);
                ctx.fillRect(carX + (10 * carScale), car.y + (20 * carScale), 8 * carScale, 5 * carScale);
            });

            ctx.restore(); 

            // 2. ОТРИСОВКА САЛОНА
            if (dashLoaded) {
                ctx.drawImage(dashImage, 0, 260, 800, 240);
            } else {
                ctx.fillStyle = '#1e1e1e';
                ctx.fillRect(0, 0, 40, 500); ctx.fillRect(760, 0, 40, 500); 
                ctx.fillStyle = '#0d2342'; 
                ctx.beginPath(); ctx.moveTo(40, 310); ctx.lineTo(760, 310); ctx.lineTo(800, 350); ctx.lineTo(0, 350); ctx.fill();
                ctx.fillStyle = '#282828'; ctx.fillRect(0, 340, 800, 160);
                ctx.fillStyle = '#1c1c1c'; ctx.fillRect(0, 460, 800, 40);
            }

            // 3. СТРЕЛКИ ПРИБОРОВ (Векторные, поверх картинки)
            if (engineStarted) {
                ctx.fillStyle = dashLightsColor;
                ctx.beginPath(); ctx.arc(200, 410, 40, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(310, 410, 40, 0, Math.PI*2); ctx.fill();
            }

            // Стрелка спидометра
            let speedAngle = 0.8 * Math.PI + (speed / maxSpeed) * 1.4 * Math.PI;
            ctx.strokeStyle = '#ff3b30'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(200, 410);
            ctx.lineTo(200 + Math.cos(speedAngle)*35, 410 + Math.sin(speedAngle)*35);
            ctx.stroke();

            // Стрелка тахометра
            let rpmAngle = 0.8 * Math.PI + ((speed * 1.2) / maxSpeed) * 1.4 * Math.PI + ((keys.w || keys.ArrowUp) && engineStarted ? 0.2 : 0);
            ctx.beginPath(); ctx.moveTo(310, 410);
            ctx.lineTo(310 + Math.cos(rpmAngle)*35, 410 + Math.sin(rpmAngle)*35);
            ctx.stroke();

            // Магнитола
            ctx.fillStyle = '#000'; ctx.fillRect(480, 365, 110, 30);
            ctx.fillStyle = engineStarted && radioOn ? '#00ff00' : '#333';
            ctx.font = '11px monospace';
            ctx.fillText(engineStarted && radioOn ? "📻 НАШ ЭФИР" : "RADIO OFF", 488, 384);

            // РУЛЬ
            ctx.save();
            ctx.translate(250, 440); 
            ctx.rotate(steeringAngle);
            ctx.strokeStyle = '#151515'; ctx.lineWidth = 14;
            ctx.beginPath(); ctx.arc(0, 0, 75, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = '#1c1c1c'; ctx.fillRect(-65, -10, 130, 20); ctx.fillRect(-15, 0, 30, 65);
            ctx.restore();

            // HUD
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, 800, 40);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif';
            ctx.fillText(`📊 Очки: ${score}`, 20, 25);
            ctx.fillText(`⏱ Скорость: ${Math.floor(speed)} км/ч`, 250, 25);
            ctx.fillText(`⛽ Топливо: ${Math.floor(fuel)}%`, 500, 25);
            ctx.fillText(`📟 Пробег: ${odometer.toFixed(1)} км`, 660, 25);

            if (!engineStarted) {
                ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 150, 800, 60);
                ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText("КЛИКНИ НА РУЛЬ, ЧТОБЫ ЗАВЕСТИ КЛАССИКУ", 400, 188); ctx.textAlign = 'start';
            }
        }

        gameLoop();
    </script>
</body>
</html>
