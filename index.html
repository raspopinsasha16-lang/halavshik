<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Халявщик 2.0 - Физический отклик</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            /* Наша Инсигния на фоне */
            background: linear-gradient(rgba(10, 10, 10, 0.85), rgba(10, 10, 10, 0.85)), url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            margin: 0;
            padding: 20px 10px;
            text-align: center;
            min-height: 100vh;
        }
        h1 { color: #e50914; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 5px; font-size: 32px; font-weight: 900; }
        .sub-title { text-shadow: 0 1px 3px rgba(0,0,0,0.8); color: #aaa; margin-bottom: 25px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .container { max-width: 480px; margin: 0 auto; padding-bottom: 50px; }
        
        /* Заголовки разделов */
        .section-title {
            text-align: left;
            color: #eee;
            font-size: 16px;
            font-weight: bold;
            margin-top: 25px;
            margin-bottom: 10px;
            padding-left: 10px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* --- СТИЛЬ ФИЗИЧЕСКИХ КНОПОК --- */
        .physical-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            
            /* Основа кнопки */
            background: #222;
            color: #fff;
            text-decoration: none;
            
            padding: 15px 20px;
            margin: 12px 0;
            border-radius: 10px;
            font-weight: bold;
            font-size: 17px;
            
            /* Эффект объема (тень и блик) */
            box-shadow: 
                0 4px 0 #111, /* Нижняя грань (толщина) */
                0 6px 10px rgba(0,0,0,0.6); /* Тень под кнопкой */
            
            border: 1px solid #333;
            
            /* Плавность для отпускания кнопки */
            transition: all 0.05s ease-out;
            position: relative;
            top: 0;
            cursor: pointer;
            
            /* Чтобы текст не выделялся при частом клике */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Эффект блика на верхней грани */
        .physical-btn::before {
            content: '';
            position: absolute;
            top: 1px;
            left: 5px;
            right: 5px;
            height: 40%;
            background: linear-gradient(rgba(255,255,255,0.08), rgba(255,255,255,0));
            border-radius: 8px 8px 0 0;
        }

        /* --- ЭФФЕКТ НАЖАТИЯ (ФИЗИКА) --- */
        .physical-btn:active {
            /* Кнопка визуально опускается вниз */
            top: 3px;
            /* Нижняя грань становится тоньше */
            box-shadow: 
                0 1px 0 #111,
                0 2px 5px rgba(0,0,0,0.8);
            /* Блик исчезает */
            background: #1d1d1d;
        }

        /* Элементы внутри кнопки */
        .btn-left { display: flex; align-items: center; gap: 15px; }
        .favicon { 
            width: 22px; 
            height: 22px; 
            border-radius: 5px; 
            background: #444; 
            object-fit: contain;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
        }
        
        .tag {
            background: #e50914;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: inset 0 -1px 0 rgba(0,0,0,0.3);
        }
        .tag.torrent { background: #248a3d; }
        .tag.cloud { background: #00bcd4; color: #000; }
        .tag.search { background: #333; color: #aaa; border: 1px solid #444; }

    </style>
</head>
<body>

    <!-- Скрытый аудиоэлемент для звука щелчка -->
    <audio id="clickSound" preload="auto">
        <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Халявщик</h1>
        <div class="sub-title">Твой механический медиа-хаб</div>

        <div class="section-title">Быстрый переход</div>
        
        <!-- КНОПКА 1: RUCTOR -->
        <a href="https://rutor.info" target="_blank" class="physical-btn" onclick="playClick()">
            <div class="btn-left">
                <img class="favicon" src="https://www.google.com/s2/favicons?sz=64&domain=rutor.info" alt="">
                <span>Rutor (Главная)</span>
            </div>
            <span class="tag torrent">Торрент</span>
        </a>

        <!-- КНОПКА 2: RUTRACKER -->
        <a href="https://rutracker.org" target="_blank" class="physical-btn" onclick="playClick()">
            <div class="btn-left">
                <img class="favicon" src="https://www.google.com/s2/favicons?sz=64&domain=rutracker.org" alt="">
                <span>RuTracker</span>
            </div>
            <span class="tag torrent">Торрент</span>
        </a>

        <!-- КНОПКА 3: HUYAMBA -->
        <a href="https://ru.huyamba.name" target="_blank" class="physical-btn" onclick="playClick()">
            <div class="btn-left">
                <img class="favicon" src="https://www.google.com/s2/favicons?sz=64&domain=ru.huyamba.name" alt="">
                <span>Huyamba</span>
            </div>
            <span class="tag">Онлайн</span>
        </a>
        
        <div class="section-title">Инструменты</div>

        <!-- КНОПКА 4: DROPMEFILES -->
        <a href="https://dropmefiles.com" target="_blank" class="physical-btn" onclick="playClick()">
            <div class="btn-left">
                <img class="favicon" src="https://www.google.com/s2/favicons?sz=64&domain=dropmefiles.com" alt="">
                <span>DropMeFiles</span>
            </div>
            <span class="tag cloud">Облако</span>
        </a>

    </div>

    <script>
        // Функция воспроизведения звука
        function playClick() {
            var sound = document.getElementById("clickSound");
            sound.currentTime = 0; // Сбрасываем звук в начало, если кликаем быстро
            sound.play();
        }
    </script>

</body>
</html>
