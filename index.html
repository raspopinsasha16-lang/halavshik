<script>
        function playSound() { 
            var audio = document.getElementById('clickSound');
            audio.currentTime = 0;
            audio.play().catch(function(e){}); 
        }
        
        function checkSearch() {
            var query = document.getElementById('movieSearch').value.trim();
            var btns = document.getElementById('searchBtns');
            if(query.length > 0) {
                btns.style.display = 'flex';
                document.getElementById('goGoogle').href = 'https://www.google.com/search?q=' + encodeURIComponent(query + ' смотреть онлайн');
                document.getElementById('goRutor').href = 'https://rutor.info/search/1/0/000/2/' + encodeURIComponent(query);
            } else { btns.style.display = 'none'; }
        }

        var client = new WebTorrent();
        var player;

        function playAction() {
            playSound();
            var link = document.getElementById('torrentUrl').value.trim();
            var container = document.getElementById('video-container');
            var status = document.getElementById('status');
            
            if(!link) { alert('Вставь ссылку!'); return; }
            status.innerHTML = 'Подключение...';
            container.innerHTML = '<video id="player" playsinline controls></video>';
            var videoElement = document.getElementById('player');
            
            var plyrConfig = { controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'pip', 'fullscreen'] };

            // 1. УМНАЯ НАСТРОЙКА IPTV ПОТОКА С ОБХОДОМ БЛОКИРОВОК БРАУЗЕРА
            if (link.includes('.m3u8') || link.includes('m3u8')) {
                status.innerHTML = '📺 Обход защиты и запуск ТВ...';
                
                // Используем бесплатный прокси для обхода CORS ограничений браузера
                var proxyLink = 'https://cors-anywhere.herokuapp.com/' + link;
                
                // Если ссылка тестовая (которую я давала), её проксировать не нужно
                if (link.includes('mux.dev')) { proxyLink = link; }

                if (Hls.isSupported()) {
                    var hls = new Hls();
                    hls.loadSource(proxyLink);
                    hls.attachMedia(videoElement);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        player = new Plyr(videoElement, plyrConfig);
                        videoElement.play().catch(function(){});
                        status.innerHTML = '📺 Прямой эфир запущен';
                    });
                    
                    // Если прокси перегружен, пробуем запустить напрямую как запасной вариант
                    hls.on(Hls.Events.ERROR, function (event, data) {
                        if (data.details === Hls.ErrorDetails.MANIFEST_LOAD_ERROR) {
                            hls.loadSource(link);
                        }
                    });

                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = link;
                    player = new Plyr(videoElement, plyrConfig);
                    videoElement.play().catch(function(){});
                    status.innerHTML = '📺 Прямой эфир запущен';
                } else {
                    status.innerHTML = '❌ Браузер не поддерживает IPTV потоки.';
                }
            } 
            // 2. ПРОВЕРКА НА ТОРРЕНТ-МАГНИТ
            else if (link.startsWith('magnet')) {
                status.innerHTML = '⚡ Ищем раздачу в торрентах...';
                client.add(link, function (torrent) {
                    var file = torrent.files.find(f => f.name.endsWith('.mp4') || f.name.endsWith('.mkv'));
                    file.renderTo('#player', { autoplay: true });
                    player = new Plyr(videoElement, plyrConfig);
                    status.innerHTML = 'Играет торрент: ' + file.name;
                });
            } 
            // 3. ОБЫЧНЫЙ СТАНДАРТНЫЙ ВИДЕОФАЙЛ
            else {
                videoElement.src = link;
                player = new Plyr(videoElement, plyrConfig);
                videoElement.play().catch(function(){});
                status.innerHTML = '🎥 Воспроизведение видеофайла...';
            }
        }
    </script>
</body>
</html>
