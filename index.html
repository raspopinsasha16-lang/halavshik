<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Халявщик</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #e50914; color: white; font-weight: bold; cursor: pointer; }
        button:active { background: #b80710; }
    </style>
</head>
<body>

    <!-- Звуковой эффект -->
    <audio id="clickSound" src="click.mp3"></audio>

    <div class="container">
        <h1>Халявщик</h1>
        
        <input type="text" id="torrentUrl" placeholder="Вставь Magnet-ссылку 🧲">
        <button onclick="playSoundAndPlay()">Смотреть онлайн (как в KMPlayer)</button>
    </div>

    <script>
        function playSoundAndPlay() {
            // Играем звук
            var sound = document.getElementById('clickSound');
            sound.play();

            // Запускаем плеер через 0.2 сек
            var link = document.getElementById('torrentUrl').value.trim();
            if(!link) { alert('Вставь ссылку!'); return; }
            
            // Сервис для онлайн-просмотра торрентов
            var playUrl = 'https://wormhole.app/api/webtorrent?url=' + encodeURIComponent(link);
            window.open('https://webtorrent.io/desktop/', '_blank'); 
        }
    </script>
</body>
</html>
