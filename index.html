<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ХАЛЯВЩИК</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #111; color: #fff; text-align: center; padding: 20px; font-family: sans-serif; }
        .container { max-width: 500px; margin: 0 auto; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #fff; text-decoration: none; }
        .btn-tv { background: #d4af37; color: #000; }
        video { width: 100%; margin-top: 15px; border: 2px solid #e50914; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ХАЛЯВЩИК</h1>
        <a href="https://rutracker.org" class="btn" style="background:#333" target="_blank">RuTracker</a>
        
        <button class="btn btn-tv" onclick="loadChannels()">📺 Загрузить ТВ</button>
        <video id="v" controls></video>
        <div id="grid"></div>
    </div>

    <script>
        const v = document.getElementById('v');
        let hls = new Hls();
        function loadChannels() {
            fetch('tv.m3u').then(r => r.text()).then(data => {
                const lines = data.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('http')) {
                        let btn = document.createElement('button');
                        btn.className = 'btn btn-tv';
                        btn.innerText = "Смотреть Саша Мастер";
                        btn.onclick = () => {
                            hls.destroy();
                            hls = new Hls();
                            hls.loadSource('https://corsproxy.io/?' + encodeURIComponent(lines[i].trim()));
                            hls.attachMedia(v);
                            v.play();
                        };
                        document.getElementById('grid').appendChild(btn);
                    }
                }
            });
        }
    </script>
</body>
</html>
