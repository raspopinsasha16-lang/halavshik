<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХАЛЯВЩИК | Торрент Кинотеатр</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(rgba(20, 20, 20, 0.85), rgba(20, 20, 20, 0.85)), url('bg.jpg') no-repeat center center;
            background-size: cover;
            color: #ffffff;
            margin: 0;
            padding: 20px 10px;
            text-align: center;
            min-height: 100vh;
        }

        h1 { color: #e50914; text-shadow: 0 2px 4px rgba(0,0,0,0.8); margin-bottom: 20px; font-size: 28px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .site-main-logo {
            width: 140px;
            height: auto;
            margin: 10px auto 25px auto;
            display: block;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.6), 0 0 15px rgba(212, 175, 55, 0.3);
            transition: transform 0.3s ease;
        }
        .site-main-logo:hover {
            transform: scale(1.05);
        }

        .player-box { background: rgba(25, 25, 25, 0.95); border: 2px solid #e50914; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .player-box input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #e50914; background: #000; color: #fff; box-sizing: border-box; }
        .main-play-btn { width: 100%; background: #e50914; color: white; border: none; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #e50914; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .main-play-btn:hover { background: #ff1f1f; }
        #video-container { margin-top: 15px; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.7); }
        #status { font-size: 14px; color: #b3b3b3; margin: 12px 0; font-weight: bold; }
        .back-btn { display: inline-block; color: #aaa; text-decoration: none; font-size: 14px; margin-top: 20px; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { color: #fff; }
        .plyr__controls { data-plyr="play"] { background: #e50914 !important; color: #fff !important; }
    </style>
</head>
<body>

<audio id="clickSound" src="click.mp3" preload="auto"></audio>

<div class="container">
    <img src="logo.png" alt="Логотип" class="site-main-logo">
    
    <div class="player-box">
        <h1>Торрент Кинотеатр</h1>
        <input type="text" id="torrentUrl" placeholder="Вставь Magnet-ссылку или ссылку на .torrent">
        <button class="main-play-btn" onclick="playAction()">Запустить просмотр</button>
        
        <div id="status">Вставьте торрент-ресурс для запуска фильма</div>
        <div id="video-container"></div>
    </div>

    <a href="index.html" class="back-btn" onclick="playSound()">← На главную страницу</a>
</div>

<script>
    function playSound() {
        var audio = document.getElementById('clickSound');
        if (audio) {
            audio.currentTime = 0;
            audio.play().catch(function(){});
        }
    }

    var client = new WebTorrent();
    var player = null;
    var plyrConfig = { controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'pip', 'fullscreen'] };

    function playAction() {
        playSound();
        const input = document.getElementById('torrentUrl').value.trim();
        const statusEl = document.getElementById('status');
        
        if(input.startsWith('magnet:') || input.endsWith('.torrent') || input.length > 20) {
            playTorrent(input);
        } else {
            statusEl.innerText = 'Пожалуйста, введите корректную magnet-ссылку или .torrent';
        }
    }

    function resetPlayerContainer() {
        const container = document.getElementById('video-container');
        container.innerHTML = '<video id="player" playsinline controls></video>';
        container.style.display = 'block';
    }

    function playTorrent(url) {
        resetPlayerContainer();
        const video = document.getElementById('player');
        const statusEl = document.getElementById('status');

        statusEl.innerText = 'Загрузка торрент-метаданных... Ожидайте пиров.';
        
        if(client.torrents.length > 0) {
            client.remove(client.torrents[0].infoHash);
        }

        client.add(url, function (torrent) {
            const file = torrent.files.find(function (file) {
                return file.name.endsWith('.mp4') || file.name.endsWith('.mkv') || file.name.endsWith('.avi');
            });

            if(file) {
                file.renderTo('video#player', { autoplay: true, controls: true });
                player = new Plyr(video, plyrConfig);
                statusEl.innerText = `Проигрывание: ${file.name}`;
            } else {
                statusEl.innerText = 'В торренте не найдено подходящих видеофайлов (.mp4, .mkv, .avi)';
            }
        });
    }
</script>

</body>
</html>
