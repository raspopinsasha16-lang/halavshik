<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Халявщик | IPTV</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #111; color: #fff; text-align: center; padding: 20px; font-family: sans-serif; }
        .container { max-width: 600px; margin: 0 auto; }
        .player-box { background: #222; padding: 20px; border-radius: 16px; border: 2px solid #e50914; }
        .tv-quick-btn { background: #248a3d; color: white; border: none; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        #video-container { margin-top: 15px; border-radius: 12px; overflow: hidden; background: #000; }
        .tv-channels-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .channel-btn { background: #333; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-box">
            <button class="tv-quick-btn" onclick="loadIPTVPlaylist('http://sachamaster.pp.ua/2020/2020399.m3u8')">📺 Загрузить каналы</button>
            <div id="video-container"><video id="player" playsinline controls></video></div>
            <div class="tv-channels-grid" id="channelsGrid"></div>
        </div>
        <a href="index.html" style="color:#aaa; display:block; margin-top:20px;">← На главную</a>
    </div>

    <script>
        var player = new Plyr('#player');
        var hlsInstance = null;
        var menuProxy = 'https://proxy.cors.sh/';

        function loadIPTVPlaylist(url) {
            fetch(menuProxy + url)
                .then(r => r.text())
                .then(data => {
                    var grid = document.getElementById('channelsGrid');
                    grid.innerHTML = '';
                    var lines = data.split('\n');
                    lines.forEach(line => {
                        line = line.trim();
                        if (line.startsWith('#EXTINF:')) {
                            var name = line.split(',')[1] || "Канал";
                            var nextLine = lines[lines.indexOf(line) + 1];
                            if (nextLine && nextLine.startsWith('http')) {
                                var btn = document.createElement('button');
                                btn.className = 'channel-btn';
                                btn.innerText = name;
                                btn.onclick = () => startStream(nextLine.trim());
                                grid.appendChild(btn);
                            }
                        }
                    });
                });
        }

        function startStream(streamUrl) {
            var video = document.getElementById('player');
            if (hlsInstance) hlsInstance.destroy();
            var url = 'https://corsproxy.io/?' + encodeURIComponent(streamUrl);
            hlsInstance = new Hls();
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        }
    </script>
</body>
</html>
